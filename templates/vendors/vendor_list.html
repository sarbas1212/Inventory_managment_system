{% extends "base/base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Vendors</h4>
    <a href="{% url 'vendors:create' %}" class="btn btn-primary btn-sm">+ New Vendor</a>
</div>

<table class="table table-bordered table-striped align-middle">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th class="text-end">Outstanding</th>
            <th class="text-center" style="width: 150px;">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for v in vendors %}
        <tr>
            <td>{{ v.name }}</td>
            <td>{{ v.phone }}</td>
            <td>{{ v.email|default:"-" }}</td>
            <td class="text-end">₹ {{ v.outstanding_balance }}</td>
            <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'vendors:edit' v.id %}" class="btn btn-sm btn-outline-primary">
                        Edit
                    </a>
                    <form method="post" action="{% url 'vendors:delete' v.id %}" 
                          style="display:inline;" 
                          onsubmit="return confirm('Are you sure you want to deactivate this vendor?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger">Deactivate</button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-center text-muted">No vendors found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
