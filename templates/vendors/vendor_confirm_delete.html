{% extends "base/base.html" %}

{% block content %}
<div class="container mt-4">
    <h4>Deactivate Vendor</h4>
    <p>Are you sure you want to deactivate <strong>{{ vendor.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Deactivate</button>
        <a href="{% url 'vendors:list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
