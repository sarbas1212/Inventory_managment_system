{% extends "base/base.html" %}
{% block content %}

<h3>Stock</h3>

<table class="table table-striped table-sm">
    <thead>
        <tr>
            <th>SKU</th>
            <th>Product</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody>
        {% for s in stocks %}
        <tr>
            <td>{{ s.product.sku }}</td>
            <td>{{ s.product.name }}</td>
            <td>{{ s.quantity }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
