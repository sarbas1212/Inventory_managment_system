<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory ERP{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --erp-bg: #f4f6f8;
            --erp-surface: #ffffff;
            --erp-border: #e2e6ea;
            --erp-text: #1f2933;
            --erp-muted: #6b7280;
            --erp-primary: #2f3e4d;
            --erp-accent: #0d6efd;
            --erp-success: #198754;
            --erp-warning: #b78103;
            --erp-danger: #b42318;
        }

        /* Global */
        body {
            font-family: 'Inter', sans-serif;
            background: var(--erp-bg);
            color: var(--erp-text);
            font-size: 14px;
        }

        /* Sidebar */
        .sidebar {
            background: #20252b;
            border-right: 1px solid #2b3137;
        }

        .nav-link {
            color: #cfd6dd;
            border-radius: 6px;
            margin: 3px 8px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 500;
        }

        .nav-link:hover {
            background: #2b3137;
            color: #fff;
        }

        .nav-link.active {
            background: #39424a;
            color: #fff;
        }

        /* Content spacing */
        .col-md-10 {
            padding: 24px 28px !important;
        }

        /* Cards (ERP style = flat panels) */
        .card {
            background: var(--erp-surface);
            border: 1px solid var(--erp-border);
            border-radius: 8px;
            box-shadow: none;
        }

        .card-header {
            background: #fbfcfd;
            border-bottom: 1px solid var(--erp-border);
            font-weight: 600;
            font-size: 13px;
        }

        /* KPI Numbers */
        .kpi-number {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .kpi-label {
            font-size: 12px;
            color: var(--erp-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Tables */
        .table {
            font-size: 13px;
        }

        .table thead {
            background: #f1f3f5;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .table-hover tbody tr:hover {
            background: #f8fafc;
        }

        /* Status badges (accounting style) */
        .badge {
            font-weight: 600;
            font-size: 11px;
            padding: 5px 8px;
            border-radius: 4px;
        }

        /* Buttons */
        .btn-primary {
            background: #2f3e4d;
            border: none;
        }

        .btn-primary:hover {
            background: #24303c;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>
    {% include "base/navbar.html" %}

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 d-none d-md-block sidebar px-0">
                {% include "base/sidebar.html" %}
            </div>

            <!-- Main Content -->
            <div class="col-md-10 py-4">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show mx-4" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
