<!-- Sidebar Brand -->
<div class="sidebar-brand">
    <div class="sidebar-brand-icon">
        <i class="bi bi-box-seam-fill"></i>
    </div>
    <span class="sidebar-brand-text">InventoryPro</span>
</div>

<!-- Navigation -->
<nav class="sidebar-nav">

    <div class="sidebar-section-label">Overview</div>

    <a class="nav-item-link {% if request.resolver_match.app_name == 'dashboard' %}active{% endif %}"

        <span>Dashboard</span>
    </a>

    <div class="sidebar-section-label">Inventory</div>

    <a class="nav-item-link {% if request.resolver_match.app_name == 'products' and request.resolver_match.url_name == 'list' %}active{% endif %}"

        <i class="bi bi-box-seam"></i>
        <span>Products</span>
    </a>
    <a class="nav-item-link {% if request.resolver_match.url_name == 'category_list' %}active{% endif %}"
        href="{% url 'products:category_list' %}">

        <span>Categories</span>
    </a>
    <a class="nav-item-link {% if request.resolver_match.app_name == 'inventory' %}active{% endif %}"
        href="{% url 'inventory:stock_list' %}">
        <i class="bi bi-clipboard-data"></i>
        <span>Stock Registry</span>
    </a>

    <div class="sidebar-section-label">Transactions</div>

    <a class="nav-item-link {% if request.resolver_match.app_name == 'purchases' %}active{% endif %}"
        href="{% url 'purchases:list' %}">
        <i class="bi bi-cart3"></i>

    </a>
    <a class="nav-item-link {% if request.resolver_match.app_name == 'invoices' %}active{% endif %}"

        href="{% url 'vendors:list' %}">
        <i class="bi bi-building"></i>
        <span>Vendors</span>
    </a>
    <a class="nav-item-link {% if request.resolver_match.app_name == 'customers' %}active{% endif %}"
        href="{% url 'customers:list' %}">
        <i class="bi bi-people"></i>

    </a>

    <a class="nav-item-link {% if request.resolver_match.app_name == 'payments' %}active{% endif %}"
        href="{% url 'payments:list' %}">

        <span>Payments</span>

<!-- Sidebar Footer -->
<div class="sidebar-footer">
    <button class="sidebar-toggle-btn" id="sidebar-toggle">
        <i class="bi bi-chevron-bar-left"></i>

    </button>
</div>
