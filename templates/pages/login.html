{% extends "pages/base.html" %}
{% block title %}Login — InventoryPro{% endblock %}

{% block content %}
<section style="min-height:70vh;display:flex;align-items:center;padding-top:calc(var(--topbar-height) + 2rem);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card p-4 p-md-5 text-center">
                    <h3 style="font-weight:700;margin-bottom:0.5rem;">Sign In</h3>
                    <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:1.5rem;">Access your dashboard
                    </p>
                    <form method="post" action="{% url 'pages:login' %}">
                        {% csrf_token %}
                        <div class="form-group">
                            <input type="text" name="username" class="form-input" placeholder="Username" required>
                        </div>
                        <div class="form-group">
                            <input type="password" name="password" class="form-input" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn-primary-gradient w-100 py-3"
                            style="justify-content:center;">Sign In</button>
                    </form>
                    <p class="mt-3" style="font-size:0.8125rem;color:var(--text-muted);">
                        Don't have an account? <a href="{% url 'pages:register' %}">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
